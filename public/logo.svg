<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Borda Externa do Pacote -->
  <rect x="64" y="32" width="384" height="448" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="4" />

  <!-- Detalhe do pacote (simulando a selagem superior e inferior) -->
  <path d="M 64 72 L 448 72" stroke="#e2e8f0" stroke-width="12" stroke-dasharray="16 12" />
  <path d="M 64 440 L 448 440" stroke="#e2e8f0" stroke-width="12" stroke-dasharray="16 12" />

  <!-- Máscara para o conteúdo colorido não vazar as bordas do pacote -->
  <clipPath id="pack-content">
    <rect x="80" y="96" width="352" height="320" rx="8" />
  </clipPath>

  <g clip-path="url(#pack-content)">
    <!-- Fundo base Vermelho -->
    <rect x="80" y="96" width="352" height="320" fill="#e11d48" />

    <!-- Formas geométricas abstraindo a paleta de 2026 -->
    <!-- Círculo Azul -->
    <circle cx="380" cy="120" r="160" fill="#2563eb" />
    
    <!-- Círculo Verde -->
    <circle cx="120" cy="400" r="180" fill="#16a34a" />
    
    <!-- Círculo Amarelo -->
    <circle cx="80" cy="120" r="120" fill="#facc15" />
    
    <!-- Círculo Roxo -->
    <circle cx="432" cy="300" r="100" fill="#9333ea" />
    
    <!-- Círculo Ciano/Azul Claro -->
    <circle cx="256" cy="450" r="140" fill="#38bdf8" />

    <!-- Fundo Central Branco (onde ficaria a taça e o '26') -->
    <rect x="156" y="156" width="200" height="200" rx="48" fill="#ffffff" shadow="0 4px 6px rgba(0,0,0,0.1)" />

    <!-- Estrela Dourada -->
    <polygon points="256,180 264,200 286,200 268,214 274,236 256,222 238,236 244,214 226,200 248,200" fill="#eab308" />

    <!-- Letra F (Figurados) em Azul Escuro Tailwind -->
    <rect x="226" y="250" width="60" height="18" rx="4" fill="#1e3a8a" />
    <rect x="226" y="250" width="18" height="72" rx="4" fill="#1e3a8a" />
    <rect x="226" y="280" width="45" height="18" rx="4" fill="#1e3a8a" />
  </g>
</svg>
